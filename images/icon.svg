<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2e86c1"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f6f7"/>
      <stop offset="100%" stop-color="#d5dbdb"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Log file page -->
  <rect x="24" y="18" width="68" height="88" rx="5" ry="5" fill="url(#page)"/>
  <!-- Dog-ear fold -->
  <path d="M72 18 L92 38 L72 38 Z" fill="#b3b6b7"/>
  <path d="M72 18 L92 38" fill="none" stroke="#a6acaf" stroke-width="1"/>

  <!-- Log lines -->
  <rect x="32" y="44" width="50" height="4" rx="2" fill="#2e86c1" opacity="0.5"/>
  <rect x="32" y="54" width="42" height="4" rx="2" fill="#2e86c1" opacity="0.5"/>
  <rect x="32" y="64" width="46" height="4" rx="2" fill="#e67e22" opacity="0.7"/>
  <rect x="32" y="74" width="38" height="4" rx="2" fill="#2e86c1" opacity="0.5"/>
  <rect x="32" y="84" width="50" height="4" rx="2" fill="#e74c3c" opacity="0.8"/>
  <rect x="32" y="94" width="44" height="4" rx="2" fill="#2e86c1" opacity="0.5"/>

  <!-- Severity dots (left gutter) -->
  <circle cx="28.5" cy="46" r="1.8" fill="#2e86c1"/>
  <circle cx="28.5" cy="56" r="1.8" fill="#2e86c1"/>
  <circle cx="28.5" cy="66" r="1.8" fill="#e67e22"/>
  <circle cx="28.5" cy="76" r="1.8" fill="#2e86c1"/>
  <circle cx="28.5" cy="86" r="1.8" fill="#e74c3c"/>
  <circle cx="28.5" cy="96" r="1.8" fill="#2e86c1"/>

  <!-- Magnifying glass -->
  <circle cx="90" cy="84" r="20" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.9"/>
  <circle cx="90" cy="84" r="14" fill="#1a5276" opacity="0.4"/>
  <line x1="104" y1="98" x2="116" y2="110" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.9"/>

  <!-- Highlight line inside lens -->
  <rect x="80" y="80" width="20" height="3" rx="1.5" fill="#f9e79f" opacity="0.9"/>
</svg>
